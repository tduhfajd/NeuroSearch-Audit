<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroSearch Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div x-data="dashboardApp()" x-init="init()" class="mx-auto max-w-6xl p-6">
      <header class="mb-6 rounded-2xl bg-slate-900 p-6 text-white">
        <h1 class="text-2xl font-bold">NeuroSearch Dashboard</h1>
        <p class="mt-2 text-sm text-slate-300">Аудиты сайта: запуск, мониторинг, результаты</p>
      </header>

      <nav class="mb-6 flex flex-wrap gap-2">
        <button
          type="button"
          class="rounded-lg border px-3 py-2 text-sm"
          :class="view === 'list' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-300 bg-white'"
          @click="setView('list')"
        >
          Список
        </button>
        <button
          type="button"
          class="rounded-lg border px-3 py-2 text-sm"
          :class="view === 'create' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-300 bg-white'"
          @click="setView('create')"
        >
          Новый аудит
        </button>
      </nav>

      <section x-show="view === 'list'" x-cloak class="rounded-2xl border border-slate-200 bg-white p-6">
        <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
          <h2 class="text-xl font-semibold">Список аудитов</h2>
          <button
            type="button"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
            @click="loadAudits()"
          >
            Обновить
          </button>
        </div>

        <div class="mb-4 flex flex-wrap gap-2">
          <template x-for="option in ['all', 'in-progress', 'completed', 'failed']" :key="option">
            <button
              type="button"
              class="rounded-lg border px-3 py-2 text-sm"
              :class="statusFilter === option ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-300 bg-white'"
              @click="statusFilter = option"
              x-text="statusFilterLabel(option)"
            ></button>
          </template>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-200">
          <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50 text-left text-slate-700">
              <tr>
                <th class="px-4 py-3 font-medium">Домен</th>
                <th class="px-4 py-3 font-medium">Дата</th>
                <th class="px-4 py-3 font-medium">SEO Score</th>
                <th class="px-4 py-3 font-medium">AVRI</th>
                <th class="px-4 py-3 font-medium">Статус</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-200">
              <template x-for="audit in filteredAudits()" :key="audit.id">
                <tr class="hover:bg-slate-50">
                  <td class="px-4 py-3">
                    <button type="button" class="text-left text-blue-700 underline" @click="openAuditResult(audit.id)">
                      <span x-text="audit.url"></span>
                    </button>
                  </td>
                  <td class="px-4 py-3" x-text="formatDate(audit.created_at)"></td>
                  <td class="px-4 py-3" x-text="formatScore(audit.seo_score)"></td>
                  <td class="px-4 py-3" x-text="formatScore(audit.avri_score)"></td>
                  <td class="px-4 py-3">
                    <span class="rounded-full px-2 py-1 text-xs font-medium" :class="statusBadgeClass(audit.status)">
                      <span x-text="statusLabel(audit.status)"></span>
                    </span>
                  </td>
                </tr>
              </template>
              <tr x-show="filteredAudits().length === 0">
                <td colspan="5" class="px-4 py-6 text-center text-slate-500">Нет аудитов для выбранного фильтра</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section x-show="view === 'create'" x-cloak class="rounded-2xl border border-slate-200 bg-white p-6">
        <h2 class="text-xl font-semibold">Запуск нового аудита</h2>
        <form class="mt-4 space-y-4" @submit.prevent="submitCreateAudit()">
          <label class="block">
            <span class="mb-1 block text-sm font-medium">URL сайта</span>
            <input
              x-model.trim="createForm.url"
              type="url"
              required
              placeholder="https://example.ru"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
            />
          </label>

          <div class="grid gap-4 md:grid-cols-2">
            <label class="block">
              <span class="mb-1 block text-sm font-medium">Ниша</span>
              <input
                x-model.trim="createForm.niche"
                type="text"
                placeholder="B2B SaaS"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
              />
            </label>

            <label class="block">
              <span class="mb-1 block text-sm font-medium">Регион</span>
              <input
                x-model.trim="createForm.region"
                type="text"
                placeholder="Москва"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
              />
            </label>
          </div>

          <div class="grid gap-4 md:grid-cols-2">
            <label class="block">
              <span class="mb-1 block text-sm font-medium">Цель</span>
              <select x-model="createForm.goal" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="leads">Лиды</option>
                <option value="info">Инфо</option>
                <option value="local">Локал</option>
                <option value="b2b">B2B</option>
              </select>
            </label>

            <label class="block">
              <span class="mb-1 block text-sm font-medium">Глубина краулинга</span>
              <select
                x-model.number="createForm.crawl_depth"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
              >
                <option :value="50">50</option>
                <option :value="200">200</option>
                <option :value="500">500</option>
              </select>
            </label>
          </div>

          <div x-show="createError" x-cloak class="rounded-lg border border-rose-300 bg-rose-50 px-3 py-2 text-sm text-rose-700">
            <span x-text="createError"></span>
          </div>

          <button
            type="submit"
            class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white disabled:cursor-not-allowed disabled:opacity-60"
            :disabled="creatingAudit"
          >
            <span x-show="!creatingAudit">Запустить аудит</span>
            <span x-show="creatingAudit" x-cloak>Запуск...</span>
          </button>
        </form>
      </section>

      <section x-show="view === 'progress'" x-cloak class="rounded-2xl border border-slate-200 bg-white p-6">
        <h2 class="text-xl font-semibold">Прогресс аудита</h2>
        <template x-if="!auditId">
          <p class="mt-2 text-sm text-slate-600">Выберите аудит или запустите новый.</p>
        </template>
        <template x-if="auditId">
          <div class="mt-4 space-y-3">
            <p class="text-sm text-slate-700">
              Аудит #<span x-text="auditId"></span>,
              статус: <span class="font-semibold" x-text="statusLabel(progressState.status)"></span>
            </p>
            <div class="h-3 w-full overflow-hidden rounded-full bg-slate-200">
              <div class="h-full bg-slate-900 transition-all duration-300" :style="`width: ${progressState.progress}%`"></div>
            </div>
            <p class="text-sm text-slate-600">
              Прогресс: <span x-text="progressState.progress"></span>% ·
              Страниц: <span x-text="progressState.pages_crawled"></span>
            </p>
            <p x-show="progressState.errors.length > 0" class="text-sm text-rose-700">
              Ошибки: <span x-text="progressState.errors.join(', ')"></span>
            </p>
          </div>
        </template>
      </section>

      <section x-show="view === 'result'" x-cloak class="rounded-2xl border border-slate-200 bg-white p-6">
        <h2 class="text-xl font-semibold">Результаты аудита</h2>
        <template x-if="!selectedAudit">
          <p class="mt-2 text-sm text-slate-600">Выберите аудит из списка для просмотра результатов.</p>
        </template>
        <template x-if="selectedAudit">
          <div class="mt-4 space-y-4">
            <div
              x-show="aiReauthRequired"
              x-cloak
              class="rounded-xl border border-amber-300 bg-amber-50 px-4 py-3 text-sm text-amber-900"
            >
              Требуется переавторизация ChatGPT. Выполните setup AI Bridge и повторите запуск AI-анализа.
            </div>

            <div class="grid gap-4 md:grid-cols-2">
              <article class="rounded-xl border border-slate-200 bg-slate-50 p-4">
                <h3 class="text-sm font-semibold uppercase tracking-wide text-slate-600">Tech Health</h3>
                <p class="mt-2 text-3xl font-bold text-slate-900" x-text="formatScore(selectedAudit.seo_score)"></p>
                <p class="text-sm text-slate-600">SEO Score</p>
              </article>
              <article class="rounded-xl border border-slate-200 bg-slate-50 p-4">
                <h3 class="text-sm font-semibold uppercase tracking-wide text-slate-600">AI Readiness</h3>
                <p class="mt-2 text-3xl font-bold text-slate-900" x-text="formatScore(selectedAudit.avri_score)"></p>
                <p class="text-sm text-slate-600">AVRI</p>
              </article>
            </div>

            <div class="flex flex-wrap items-center gap-3">
              <button
                type="button"
                class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
                :disabled="aiAnalyzeLoading"
                @click="runAiAnalyze()"
              >
                <span x-show="!aiAnalyzeLoading">Запустить AI-анализ</span>
                <span x-show="aiAnalyzeLoading" x-cloak>Запуск AI...</span>
              </button>
              <span x-show="aiAnalyzeError" x-cloak class="text-sm text-rose-700" x-text="aiAnalyzeError"></span>
            </div>

            <article class="rounded-xl border border-slate-200 bg-white p-4">
              <h3 class="text-base font-semibold">Issue Map</h3>
              <div class="mt-3 space-y-2">
                <template x-for="priority in ['P0', 'P1', 'P2', 'P3']" :key="priority">
                  <div class="rounded-lg border border-slate-200">
                    <button
                      type="button"
                      class="flex w-full items-center justify-between px-3 py-2 text-left text-sm font-medium"
                      @click="togglePriority(priority)"
                    >
                      <span>
                        <span x-text="priority"></span>
                        (<span x-text="(issueMap[priority] || []).length"></span>)
                      </span>
                      <span x-text="openedPriorities[priority] ? '−' : '+'"></span>
                    </button>
                    <div x-show="openedPriorities[priority]" x-cloak class="border-t border-slate-200 px-3 py-2">
                      <template x-if="(issueMap[priority] || []).length === 0">
                        <p class="text-sm text-slate-500">Нет проблем</p>
                      </template>
                      <template x-for="issue in issueMap[priority] || []" :key="issue.id">
                        <article class="mb-3 rounded-md bg-slate-50 p-3 text-sm">
                          <h4 class="font-semibold" x-text="issue.title"></h4>
                          <p class="mt-1 text-slate-700" x-text="issue.description"></p>
                          <p class="mt-1 text-slate-700">
                            <span class="font-medium">Рекомендация:</span>
                            <span x-text="issue.recommendation"></span>
                          </p>
                          <p class="mt-1 text-xs text-slate-500" x-show="issue.affected_url">
                            URL: <span x-text="issue.affected_url"></span>
                          </p>
                        </article>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </article>
          </div>
        </template>
      </section>
    </div>

    <script>
      function dashboardApp() {
        return {
          view: "list",
          auditId: null,
          audits: [],
          statusFilter: "all",
          loadingAudits: false,
          listError: "",
          creatingAudit: false,
          createError: "",
          aiAnalyzeLoading: false,
          aiReauthRequired: false,
          aiAnalyzeError: "",
          selectedAudit: null,
          issueMap: { P0: [], P1: [], P2: [], P3: [] },
          openedPriorities: { P0: true, P1: false, P2: false, P3: false },
          progressPollTimer: null,
          progressState: {
            status: "pending",
            progress: 0,
            pages_crawled: 0,
            errors: [],
          },
          createForm: {
            url: "",
            niche: "",
            region: "",
            goal: "leads",
            crawl_depth: 200,
          },

          init() {
            this.syncFromUrl();
            window.addEventListener("popstate", () => this.syncFromUrl());
            this.loadAudits();
          },

          setView(nextView, auditId = null) {
            if (this.view === "progress" && nextView !== "progress") {
              this.stopProgressPolling();
            }
            this.view = nextView;
            this.auditId = auditId;

            const params = new URLSearchParams(window.location.search);
            params.set("view", nextView);
            if (auditId) {
              params.set("audit_id", String(auditId));
            } else {
              params.delete("audit_id");
            }
            const query = params.toString();
            const nextUrl = query ? `?${query}` : window.location.pathname;
            window.history.pushState({}, "", nextUrl);

            if (nextView === "progress" && auditId) {
              this.startProgressPolling(Number(auditId));
            }
            if (nextView === "result" && auditId) {
              this.openAuditResult(Number(auditId));
            }
          },

          syncFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const nextView = params.get("view");
            const allowedViews = ["list", "create", "progress", "result"];
            this.view = allowedViews.includes(nextView) ? nextView : "list";
            this.auditId = params.get("audit_id");
            if (this.view === "progress" && this.auditId) {
              this.startProgressPolling(Number(this.auditId));
            }
            if (this.view === "result" && this.auditId) {
              this.openAuditResult(Number(this.auditId));
            }
          },

          async loadAudits() {
            this.loadingAudits = true;
            this.listError = "";
            try {
              const response = await fetch("/audits");
              if (!response.ok) {
                throw new Error("Не удалось загрузить список аудитов");
              }
              const payload = await response.json();
              this.audits = Array.isArray(payload)
                ? payload.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                : [];
            } catch (error) {
              this.listError = error instanceof Error ? error.message : "Ошибка загрузки списка";
              this.audits = [];
            } finally {
              this.loadingAudits = false;
            }
          },

          statusFilterLabel(value) {
            if (value === "all") return "Все";
            if (value === "in-progress") return "В работе";
            if (value === "completed") return "Завершены";
            return "С ошибкой";
          },

          filteredAudits() {
            if (this.statusFilter === "all") {
              return this.audits;
            }
            if (this.statusFilter === "in-progress") {
              return this.audits.filter((audit) =>
                ["pending", "crawling", "analyzing"].includes(audit.status),
              );
            }
            if (this.statusFilter === "completed") {
              return this.audits.filter((audit) => audit.status === "completed");
            }
            return this.audits.filter((audit) => audit.status === "failed");
          },

          openAuditResult(auditId) {
            this.auditId = Number(auditId);
            this.loadAuditDetails(this.auditId);
            this.loadAuditIssues(this.auditId);
            if (this.view !== "result") {
              this.setView("result", auditId);
            }
          },

          statusLabel(value) {
            if (value === "pending") return "Ожидание";
            if (value === "crawling") return "Краулинг";
            if (value === "analyzing") return "Анализ";
            if (value === "completed") return "Завершен";
            if (value === "failed") return "Ошибка";
            return value;
          },

          statusBadgeClass(value) {
            if (["pending", "crawling", "analyzing"].includes(value)) {
              return "bg-amber-100 text-amber-800";
            }
            if (value === "completed") {
              return "bg-emerald-100 text-emerald-800";
            }
            return "bg-rose-100 text-rose-800";
          },

          formatDate(value) {
            if (!value) return "—";
            return new Date(value).toLocaleString("ru-RU");
          },

          formatScore(value) {
            if (value === null || value === undefined) return "—";
            return Number(value).toFixed(1);
          },

          async submitCreateAudit() {
            this.creatingAudit = true;
            this.createError = "";

            try {
              const payload = {
                url: this.createForm.url,
                niche: this.createForm.niche || null,
                region: this.createForm.region || null,
                goal: this.createForm.goal,
                crawl_depth: this.createForm.crawl_depth,
              };
              const response = await fetch("/audits", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              if (!response.ok) {
                throw new Error("Не удалось запустить аудит. Проверьте данные формы.");
              }
              const createdAudit = await response.json();
              await this.loadAudits();
              this.setView("progress", createdAudit.id);
            } catch (error) {
              this.createError = error instanceof Error ? error.message : "Ошибка отправки формы";
            } finally {
              this.creatingAudit = false;
            }
          },

          async loadAuditDetails(auditId) {
            const response = await fetch(`/audits/${auditId}`);
            if (!response.ok) {
              throw new Error("Не удалось загрузить детали аудита");
            }
            this.selectedAudit = await response.json();
          },

          async loadAuditIssues(auditId) {
            const response = await fetch(`/audits/${auditId}/issues`);
            if (!response.ok) {
              throw new Error("Не удалось загрузить карту проблем");
            }
            this.issueMap = await response.json();
          },

          togglePriority(priority) {
            this.openedPriorities[priority] = !this.openedPriorities[priority];
          },

          async runAiAnalyze() {
            if (!this.auditId) return;
            this.aiAnalyzeLoading = true;
            this.aiAnalyzeError = "";
            this.aiReauthRequired = false;

            try {
              const response = await fetch(`/audits/${this.auditId}/ai-analyze`, {
                method: "POST",
              });
              if (response.status === 409) {
                const detailPayload = await response.json();
                if (detailPayload?.detail?.code === "reauth_required") {
                  this.aiReauthRequired = true;
                  return;
                }
              }
              if (!response.ok) {
                throw new Error("Не удалось запустить AI-анализ");
              }
              await this.loadAuditDetails(this.auditId);
            } catch (error) {
              this.aiAnalyzeError = error instanceof Error ? error.message : "Ошибка AI-анализа";
            } finally {
              this.aiAnalyzeLoading = false;
            }
          },

          stopProgressPolling() {
            if (this.progressPollTimer) {
              clearInterval(this.progressPollTimer);
              this.progressPollTimer = null;
            }
          },

          startProgressPolling(auditId) {
            this.stopProgressPolling();
            const tick = async () => {
              const response = await fetch(`/audits/${auditId}/status`);
              if (!response.ok) {
                return;
              }
              const payload = await response.json();
              this.progressState = payload;
              if (["completed", "failed"].includes(payload.status)) {
                this.stopProgressPolling();
                if (payload.status === "completed") {
                  this.setView("result", auditId);
                }
              }
            };

            tick();
            this.progressPollTimer = setInterval(tick, 2000);
          },
        };
      }
    </script>
  </body>
</html>
