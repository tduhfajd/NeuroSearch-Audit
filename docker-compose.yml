services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neurosearch_audit
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d neurosearch_audit"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/neurosearch_audit
      AUTO_DRAIN_QUEUE: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./chatgpt_session:/app/chatgpt_session
      - ./generated_reports:/app/generated_reports
    command: >
      sh -c "alembic -c backend/db/migrations/alembic.ini upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
